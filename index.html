<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>J.A.R.V.I.S.</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght=400;700;900&family=Rajdhani:wght=300;400;600&display=swap');
  :root { --primary: #00d4ff; --secondary: #0066ff; --accent: #ff6b00; --bg: #020812; --text: #c8e6f5; --glow: 0 0 20px rgba(0, 212, 255, 0.5); }
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  .corner { position: fixed; width: 40px; height: 40px; border-color: var(--primary); border-style: solid; opacity: 0.3; z-index: 1; }
  .corner.tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
  .corner.tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }
  header { text-align: center; padding: 15px 10px; border-bottom: 1px solid rgba(0,212,255,0.15); background: rgba(2,8,18,0.8); }
  .logo { font-family: 'Orbitron', monospace; font-size: 20px; font-weight: 900; color: var(--primary); text-shadow: var(--glow); letter-spacing: 6px; }
  .status-bar { display: flex; justify-content: center; gap: 15px; margin-top: 5px; font-size: 10px; color: rgba(0,212,255,0.5); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 6px #00ff88; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 10px; align-items: center; }
  .arc-container { margin: 15px 0; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .arc-reactor { position: relative; width: 100px; height: 100px; }
  .arc-reactor svg { width: 100%; height: 100%; animation: rotate 8s linear infinite; }
  .arc-reactor .inner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 35px; height: 35px; background: radial-gradient(circle, #ffffff, var(--primary), transparent); border-radius: 50%; box-shadow: 0 0 20px var(--primary); }
  @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .chat-area { width: 100%; flex: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(0,212,255,0.1); background: rgba(0,0,0,0.2); border-radius: 6px; }
  .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
  .message { max-width: 85%; font-size: 14px; padding: 10px 14px; border-radius: 4px; line-height: 1.4; }
  .message.user { align-self: flex-end; background: rgba(255,107,0,0.1); border: 1px solid rgba(255,107,0,0.2); color: #ffd4a8; }
  .message.jarvis { align-self: flex-start; background: rgba(0,212,255,0.07); border: 1px solid rgba(0,212,255,0.15); color: var(--text); border-left: 3px solid var(--primary); }
  .input-area { width: 100%; padding: 10px; display: flex; gap: 8px; background: rgba(2,8,18,0.9); }
  textarea { flex: 1; background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2); border-radius: 4px; padding: 10px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-size: 15px; resize: none; outline: none; height: 42px; }
  .btn { background: rgba(0,212,255,0.1); border: 1px solid var(--primary); color: var(--primary); padding: 0 15px; border-radius: 4px; cursor: pointer; font-family: 'Orbitron', monospace; font-size: 11px; letter-spacing: 1px; }
  .modal-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal { background: #040f1e; border: 1px solid var(--primary); border-radius: 6px; padding: 25px; width: 90%; max-width: 360px; text-align: center; }
  .modal input { width: 100%; background: rgba(0,212,255,0.05); border: 1px solid rgba(0,212,255,0.2); border-radius: 4px; padding: 10px; color: var(--text); margin: 15px 0; text-align: center; outline: none; }
</style>
</head>
<body>

<div class="modal-overlay" id="apiModal">
  <div class="modal">
    <div class="logo">J.A.R.V.I.S.</div>
    <input type="password" id="apiKeyInput" placeholder="Groq API Anahtarı (gsk_...)" autocomplete="off" />
    <button class="btn" style="height:40px; width:100%" onclick="initJarvis()">SİSTEMİ BAŞLAT</button>
  </div>
</div>

<div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>

<header>
  <div class="logo">J.A.R.V.I.S.</div>
  <div class="status-bar">
    <div id="sysState"><span class="status-dot"></span> ÇEKİRDEK AKTİF</div>
    <div id="micStatus">MİKROFON: AKTİF</div>
  </div>
</header>

<div class="main" id="mainContainer">
  <div class="arc-container">
    <div class="arc-reactor">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" fill="none" stroke="var(--primary)" stroke-width="2" stroke-dasharray="20 10"/>
        <circle cx="60" cy="60" r="30" fill="none" stroke="rgba(0,212,255,0.3)" stroke-width="1"/>
      </svg>
      <div class="inner"></div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="message jarvis">Sesli ve mobil sistem entegrasyonu tamamlandı Efendim. Dinleme modu aktif.</div>
    </div>
    <div class="input-area">
      <textarea id="userInput" placeholder='Bir emir verin...' rows="1"></textarea>
      <button class="btn" onclick="sendMessage()">GÖNDER</button>
    </div>
  </div>
</div>

<script>
let apiKey = '';
let conversationHistory = [];
let isWaitingForResponse = false;
let recognition = null;

const SYSTEM_PROMPT = `Sen J.A.R.V.I.S. asistanısın. Kullanıcıya "Efendim" diye hitap edersin. Kısa ve asil yanıtlar verirsin.`;

// Android APK içinde dış linkleri güvenli tetikleme fonksiyonu
function openAndroidLink(url) {
  location.href = url;
}

function checkSystemCommands(text) {
  let lower = text.toLowerCase().trim();
  if (lower.includes('aç') || lower.includes('başlat')) {
    if (lower.includes('youtube')) { openAndroidLink('https://www.youtube.com'); return "YouTube açılıyor, Efendim."; }
    if (lower.includes('google')) { openAndroidLink('https://www.google.com'); return "Google açılıyor, Efendim."; }
    if (lower.includes('spotify')) { openAndroidLink('https://open.spotify.com'); return "Spotify başlatılıyor, Efendim."; }
  }
  if (lower.includes('ara') && lower.includes('google')) {
    let query = text.replace(/google'da|google da|ara/gi, '').trim();
    if(query.length > 0) { openAndroidLink(`https://www.google.com/search?q=${encodeURIComponent(query)}`); return `"${query}" konusu araştırılıyor Efendim.`; }
  }
  return null;
}

function startVoiceRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    appendMessage('jarvis', 'Hata: Cihazınız ses tanımayı desteklemiyor.');
    return;
  }
  
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = false;
  recognition.lang = 'tr-TR';

  recognition.onresult = (event) => {
    if (isWaitingForResponse) return;
    let resultText = event.results[event.results.length - 1][0].transcript.trim();
    if (resultText.length > 1) {
      sendMessage(resultText);
    }
  };

  recognition.onerror = (e) => {
    console.log("Ses tanıma hatası:", e);
  };

  recognition.onend = () => {
    if (!isWaitingForResponse) { try { recognition.start(); } catch(e){} }
  };

  try { recognition.start(); } catch(e){}
}

function initJarvis() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key.startsWith('gsk_')) { alert('Geçerli bir Groq anahtarı girin.'); return; }
  apiKey = key;
  localStorage.setItem('jarvis_mobile_key', key);
  document.getElementById('apiModal').style.display = 'none';
  speak("Sistem çekirdeği aktif Efendim.", () => { startVoiceRecognition(); });
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('jarvis_mobile_key');
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
  }
});

async function sendMessage(textFromVoice = null) {
  if (isWaitingForResponse) return;
  const input = document.getElementById('userInput');
  const text = textFromVoice ? textFromVoice : input.value.trim();
  if (!text || !apiKey) return;

  if (!textFromVoice) input.value = '';
  appendMessage('user', text);
  
  let sysResp = checkSystemCommands(text);
  if (sysResp) {
    appendMessage('jarvis', sysResp);
    speak(sysResp, () => {});
    return;
  }

  isWaitingForResponse = true;
  conversationHistory.push({ role: 'user', content: text });

  try {
    const res = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model: 'llama-3.1-8b-instant', messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...conversationHistory], temperature: 0.5 })
    });
    const data = await res.json();
    const response = data.choices?.[0]?.message?.content || 'Bağlantı hatası.';
    
    appendMessage('jarvis', response);
    conversationHistory.push({ role: 'assistant', content: response });
    
    speak(response, () => {});
  } catch (err) {
    appendMessage('jarvis', 'Bağlantı hatası gerçekleşti.');
  } finally {
    isWaitingForResponse = false;
  }
}

function appendMessage(role, text) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerText = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function speak(text, onEnd) {
  if (!window.speechSynthesis) { if(onEnd) onEnd(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'tr-TR';
  u.rate = 1.0;
  if (onEnd) u.onend = onEnd;
  window.speechSynthesis.speak(u);
}
</script>
</body>
  </html>
