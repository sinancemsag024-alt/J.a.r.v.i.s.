name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Install Tools & Capacitor
      run: |
        npm init -y
        mkdir -p www
        mv index.html www/
        npm install @capacitor/core @capacitor/cli @capacitor/android
        npx cap init "JARVIS" "com.stark.jarvis" --web-dir=www
        npx cap add android

    - name: Configure Android Permissions
      run: |
        sed -i '/<application/i <uses-permission android:name="android.permission.RECORD_AUDIO" />\n<uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml

    - name: Build Android App (APK)
      run: |
        npx cap sync
        cd android && ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: jarvis-voice-assistant
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
