name: J.A.R.V.I.S. Android Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Install Tools & Capacitor
      run: |
        npm init -y
        mkdir -p www
        mv index.html www/
        # Sürüm çakışmalarını engellemek için Capacitor paketlerini sabitliyoruz
        npm install @capacitor/core@6.0.0 @capacitor/cli@6.0.0 @capacitor/android@6.0.0
        npx cap init "JARVIS" "com.stark.jarvis" --web-dir=www
        npx cap add android

    - name: Configure Android Permissions & Fix Kotlin Duplicate Error
      run: |
        # Mikrofon ve internet izinlerini ekler
        sed -i '/<application/i <uses-permission android:name="android.permission.RECORD_AUDIO" />\n<uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
        
        # Gradle içindeki çakışan Kotlin kütüphanelerini tek bir sürüme zorlar
        echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22', 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22' } }" >> android/build.gradle

    - name: Build Android App (APK)
      run: |
        npx cap sync
        cd android && ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: jarvis-voice-assistant
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
